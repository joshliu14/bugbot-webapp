version: "3.9"
services:
  client:
    build: ./client
    expose:
      - "3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    stdin_open: true
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - server

  server:
    build: ./server
    expose:
      - "8080"
    volumes:
      - ./server:/app
      - /app/node_modules

  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - client
      - server

volumes:
  caddy_data:
  caddy_config:
